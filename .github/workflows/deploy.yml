name: ClipForge CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: clipforge-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  STACK_NAME: ClipForgeStack
  NODE_ENV: production
  DEV_MODE: "false"
  APP_DOMAIN_NAME: clipforged.xyz
  APP_HOSTED_ZONE_NAME: clipforged.xyz
  API_DOMAIN_NAME: api.clipforged.xyz
  LAMBDA_DOMAIN_NAME: lambda.clipforged.xyz
  APP_ORIGIN: https://clipforged.xyz,https://www.clipforged.xyz
  API_BASE_URL: https://api.clipforged.xyz

jobs:
  deploy:
    name: Typecheck, Deploy, And Publish Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install infrastructure dependencies
        working-directory: infra
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Verify Route53 hosted zone
        run: |
          HOSTED_ZONE_ID="$(aws route53 list-hosted-zones-by-name --dns-name "${APP_HOSTED_ZONE_NAME}" --query "HostedZones[?Name=='${APP_HOSTED_ZONE_NAME}.'].Id | [0]" --output text)"

          if [ -z "${HOSTED_ZONE_ID}" ] || [ "${HOSTED_ZONE_ID}" = "None" ]; then
            echo "Route53 hosted zone '${APP_HOSTED_ZONE_NAME}' was not found." >&2
            echo "Create the hosted zone and update Porkbun nameservers before running deployment." >&2
            exit 1
          fi

      - name: Bootstrap CDK
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          bunx aws-cdk bootstrap "aws://${ACCOUNT_ID}/${AWS_REGION}"
        working-directory: infra

      - name: Deploy AWS stack
        run: bunx aws-cdk deploy --require-approval never
        working-directory: infra
        env:
          NODE_ENV: ${{ env.NODE_ENV }}
          APP_DOMAIN_NAME: ${{ env.APP_DOMAIN_NAME }}
          APP_HOSTED_ZONE_NAME: ${{ env.APP_HOSTED_ZONE_NAME }}
          API_DOMAIN_NAME: ${{ env.API_DOMAIN_NAME }}
          LAMBDA_DOMAIN_NAME: ${{ env.LAMBDA_DOMAIN_NAME }}
          APP_ORIGIN: ${{ env.APP_ORIGIN }}
          API_BASE_URL: ${{ env.API_BASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Read stack outputs
        id: stack_outputs
        run: |
          FRONTEND_BUCKET="$(aws cloudformation describe-stacks --stack-name "${STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" --output text)"
          FRONTEND_DISTRIBUTION_ID="$(aws cloudformation describe-stacks --stack-name "${STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='FrontendDistributionId'].OutputValue" --output text)"
          RAW_API_URL="$(aws cloudformation describe-stacks --stack-name "${STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text)"

          if [ -z "${FRONTEND_BUCKET}" ] || [ "${FRONTEND_BUCKET}" = "None" ]; then
            echo "FrontendBucketName stack output is missing." >&2
            exit 1
          fi

          if [ -z "${FRONTEND_DISTRIBUTION_ID}" ] || [ "${FRONTEND_DISTRIBUTION_ID}" = "None" ]; then
            echo "FrontendDistributionId stack output is missing." >&2
            exit 1
          fi

          if [ -z "${RAW_API_URL}" ] || [ "${RAW_API_URL}" = "None" ]; then
            echo "ApiUrl stack output is missing." >&2
            exit 1
          fi

          echo "frontend_bucket=${FRONTEND_BUCKET}" >> "$GITHUB_OUTPUT"
          echo "frontend_distribution_id=${FRONTEND_DISTRIBUTION_ID}" >> "$GITHUB_OUTPUT"
          echo "raw_api_url=${RAW_API_URL}" >> "$GITHUB_OUTPUT"

      - name: Build frontend
        run: bun run build:web
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}
          FALLBACK_API_BASE_URL: ${{ steps.stack_outputs.outputs.raw_api_url }}
          DEV_MODE: ${{ env.DEV_MODE }}

      - name: Upload immutable frontend assets
        run: |
          aws s3 sync apps/web/dist "s3://${{ steps.stack_outputs.outputs.frontend_bucket }}" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload frontend index
        run: |
          aws s3 cp apps/web/dist/index.html "s3://${{ steps.stack_outputs.outputs.frontend_bucket }}/index.html" \
            --content-type "text/html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate frontend CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.stack_outputs.outputs.frontend_distribution_id }}" \
            --paths "/*"

      - name: Smoke test API health
        run: curl --fail --silent --show-error "${API_BASE_URL}/health"
